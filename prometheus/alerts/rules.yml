groups:
  - name: host-alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} is unreachable"
          value: "No response for 1 minute"
          runbook_url: "https://github.com/lerkush/observability-stack/blob/main/docs/runbook.md#instance-down"

      - alert: HighCpuUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} CPU usage high"
          value: "{{ printf \"%.0f\" $value }}% (5 min)"
          runbook_url: "https://github.com/lerkush/observability-stack/blob/main/docs/runbook.md#cpu-high"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} RAM usage high"
          value: "{{ printf \"%.0f\" $value }}%"
          runbook_url: "https://github.com/lerkush/observability-stack/blob/main/docs/runbook.md#memory-high"

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} disk filling up"
          value: "{{ printf \"%.0f\" $value }}% ({{ $labels.mountpoint }})"
          runbook_url: "https://github.com/lerkush/observability-stack/blob/main/docs/runbook.md#disk-low"